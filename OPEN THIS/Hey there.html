<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>for you, quietly</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Quicksand:wght@300;400;500;600&display=swap');

  :root{
    --night-base:#0a0a1a;
    --aurora-violet:#1a1232;
    --plum:#3d1f4e;
    --firefly-pink:#ff6fa8;
    --warm-white:#f5d4e8;
    --firefly-gold:#ffd47e;
    --glass-bg: rgba(245, 212, 232, 0.06);
    --glass-border: rgba(245, 212, 232, 0.18);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{
    width:100%; height:100%;
    overflow:hidden;
    background:var(--night-base);
    font-family:'Quicksand', sans-serif;
    color:var(--warm-white);
    -webkit-tap-highlight-color: transparent;
  }
  ::selection{ background: var(--firefly-pink); color:var(--night-base); }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  button{ font-family:inherit; }
  button:focus-visible, textarea:focus-visible, .glass-btn:focus-visible{
    outline: 2px solid var(--firefly-gold);
    outline-offset: 3px;
  }

  #sky{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 0%, rgba(61,31,78,0.55), transparent 60%),
      radial-gradient(ellipse 70% 50% at 85% 100%, rgba(255,111,168,0.12), transparent 60%),
      linear-gradient(160deg, #07060f 0%, #0a0a1a 35%, #160f29 70%, #1a1232 100%);
    transition: filter 1.5s ease;
  }
  #sky.bright{ filter: brightness(1.35) saturate(1.15); }
  #sky.listen-dim{ filter: brightness(0.55) saturate(0.9); }

  #aurora{
    position:fixed; inset:-10% -10% -10% -10%; z-index:0;
    opacity:0.5; pointer-events:none; mix-blend-mode: screen;
    background:
      radial-gradient(circle at 30% 20%, rgba(255,111,168,0.10), transparent 35%),
      radial-gradient(circle at 70% 75%, rgba(126,87,194,0.14), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255,212,126,0.05), transparent 50%);
    animation: auroraDrift 22s ease-in-out infinite alternate;
  }
  @keyframes auroraDrift{
    0%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(2%,-3%) scale(1.06); }
    100%{ transform: translate(-2%,2%) scale(1.02); }
  }

  canvas#fx{ position:fixed; inset:0; z-index:1; pointer-events:none; }

  #stage{
    position:relative; z-index:2;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    perspective: 1200px;
  }

  .card{
    position:absolute;
    width:min(680px, 88vw);
    max-height:80vh;
    padding: 48px 40px;
    text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:26px;
    opacity:0; pointer-events:none;
    filter: blur(18px);
    transform: scale(0.92) translateY(18px);
    transition: opacity 1.35s cubic-bezier(.2,.7,.2,1), filter 1.35s cubic-bezier(.2,.7,.2,1), transform 1.35s cubic-bezier(.2,.7,.2,1);
  }
  .card.active{
    opacity:1; pointer-events:auto;
    filter: blur(0); transform: scale(1) translateY(0);
  }
  .card.leaving{
    opacity:0; filter: blur(14px); transform: scale(1.05) translateY(-14px);
    transition: opacity 0.8s ease, filter 0.8s ease, transform 0.8s ease;
  }

  .eyebrow{
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(245,212,232,0.45);
    font-weight: 500;
  }

  .title{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(2.1rem, 6vw, 3.6rem);
    line-height: 1.18;
    color: var(--warm-white);
    text-shadow: 0 0 28px rgba(255,111,168,0.25);
  }
  .title.glow{ animation: titlePulse 3.2s ease-in-out infinite; }
  @keyframes titlePulse{
    0%,100%{ text-shadow: 0 0 22px rgba(255,111,168,0.22); }
    50%{ text-shadow: 0 0 42px rgba(255,212,126,0.4); }
  }

  .subtitle{
    font-weight:300;
    font-size: clamp(0.98rem, 2.2vw, 1.15rem);
    color: rgba(245,212,232,0.78);
    max-width: 480px;
    line-height: 1.6;
  }

  .typewriter::after{
    content:'▌';
    margin-left:2px;
    animation: blinkCursor 0.9s steps(1) infinite;
    color: var(--firefly-pink);
  }
  .typewriter.done::after{ display:none; }
  @keyframes blinkCursor{ 50%{ opacity:0; } }

  .playful-wiggle{ display:inline-block; animation: wiggle 1.8s ease-in-out infinite; }
  @keyframes wiggle{
    0%,100%{ transform: rotate(0deg); }
    25%{ transform: rotate(-4deg); }
    75%{ transform: rotate(4deg); }
  }

  .reveal-stack{ display:flex; flex-direction:column; gap:14px; min-height:140px; align-items:center; justify-content:center; }
  .reveal-line{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1.6rem, 4.4vw, 2.4rem);
    opacity:0;
    transform: translateY(10px);
    transition: opacity 1s ease, transform 1s ease;
  }
  .reveal-line.show{ opacity:1; transform: translateY(0); }

  /* Glass button */
  .glass-btn{
    position:relative;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: var(--warm-white);
    padding: 14px 34px;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight:500;
    letter-spacing: 0.02em;
    cursor:pointer;
    overflow:hidden;
    transition: transform 0.35s ease, box-shadow 0.35s ease, background 0.35s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }
  .glass-btn:hover{
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 14px 40px rgba(255,111,168,0.25), 0 0 30px rgba(255,212,126,0.15);
    background: rgba(245,212,232,0.1);
  }
  .glass-btn:active{ transform: translateY(-1px) scale(0.98); }

  .ripple{
    position:absolute; border-radius:50%;
    background: rgba(255,255,255,0.5);
    transform: scale(0); opacity:0.6;
    animation: rippleAnim 0.7s ease-out forwards;
    pointer-events:none;
  }
  @keyframes rippleAnim{ to{ transform: scale(2.6); opacity:0; } }

  .next-wrap{ display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:6px; }
  .next-emoji{ font-size:1.4rem; animation: floatY 2.6s ease-in-out infinite; }
  @keyframes floatY{ 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-6px); } }

  #progress{
    position:fixed; bottom: 22px; left:50%; transform:translateX(-50%);
    z-index:3;
    display:flex; gap:5px;
  }
  #progress span{
    width:5px; height:5px; border-radius:50%;
    background: rgba(245,212,232,0.18);
    transition: background 0.4s ease, width 0.4s ease;
  }
  #progress span.seen{ background: rgba(255,111,168,0.55); }
  #progress span.now{ background: var(--firefly-gold); width:14px; border-radius:3px; }

  #soundToggle{
    position:fixed; top:22px; right:22px; z-index:5;
    width:46px; height:46px; border-radius:50%;
    background: var(--glass-bg); border:1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:1.2rem;
    transition: transform 0.3s ease;
  }
  #soundToggle:hover{ transform: scale(1.08); }
  #soundToggle.muted{ filter: grayscale(1) opacity(0.6); }

  #skipHint{
    position:fixed; top:22px; left:22px; z-index:5;
    font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase;
    color: rgba(245,212,232,0.35);
    font-weight:500;
  }

  /* final choice page */
  .choice-row{ display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin-top:8px; }

  /* Modal */
  #modalOverlay{
    position:fixed; inset:0; z-index:10;
    background: rgba(5,4,12,0.72);
    backdrop-filter: blur(6px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity 0.5s ease;
  }
  #modalOverlay.open{ opacity:1; pointer-events:auto; }
  .modal-box{
    width:min(480px, 88vw);
    background: linear-gradient(160deg, rgba(26,18,50,0.92), rgba(10,10,26,0.95));
    border:1px solid var(--glass-border);
    border-radius:22px;
    padding: 34px 30px;
    text-align:center;
    transform: translateY(16px) scale(0.97);
    transition: transform 0.5s cubic-bezier(.2,.7,.2,1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  #modalOverlay.open .modal-box{ transform: translateY(0) scale(1); }
  .modal-box h3{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:500;
    font-size:1.6rem; margin-bottom:18px; color:var(--warm-white);
  }
  .modal-box textarea{
    width:100%; min-height:110px; resize:vertical;
    background: rgba(245,212,232,0.05);
    border:1px solid var(--glass-border);
    border-radius:14px;
    padding:14px;
    color:var(--warm-white);
    font-family:'Quicksand', sans-serif;
    font-size:0.92rem;
    margin-bottom:16px;
  }
  .modal-box textarea::placeholder{ color: rgba(245,212,232,0.35); }
  .modal-actions{ display:flex; gap:10px; justify-content:center; }
  .modal-status{ font-size:0.78rem; margin-top:12px; color: rgba(245,212,232,0.55); min-height:1.2em; }
  .modal-close{
    position:absolute; top:14px; right:18px;
    background:none; border:none; color: rgba(245,212,232,0.5);
    font-size:1.2rem; cursor:pointer;
  }

  @media (max-width: 520px){
    .card{ padding: 36px 22px; gap:20px; }
    .choice-row{ flex-direction:column; width:100%; }
    .choice-row .glass-btn{ width:100%; }
  }

  /* Headphone warning page */
  .headphone-emoji{
    font-size: 2.8rem;
    animation: floatY 3s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(255,212,126,0.35));
  }
  .headphone-lines{ display:flex; flex-direction:column; gap:10px; }
  .headphone-lines p{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1.2rem, 3.4vw, 1.7rem);
    color: rgba(245,212,232,0.88);
    line-height:1.5;
  }
  .headphone-lines p.small{
    font-family:'Quicksand', sans-serif;
    font-style: normal;
    font-size: 0.85rem;
    letter-spacing:0.04em;
    color: rgba(245,212,232,0.5);
    text-transform: uppercase;
  }

  /* Listen page */
  #stage.dimmed::before{
    content:'';
    position:fixed; inset:0; z-index:1;
    background: rgba(4,3,10,0.55);
    pointer-events:none;
    transition: opacity 1.2s ease;
  }
  .listen-btn{
    width: 96px; height:96px; border-radius:50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(14px);
    display:flex; align-items:center; justify-content:center;
    font-size: 2rem;
    cursor:pointer;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    box-shadow: 0 0 0 0 rgba(255,111,168,0.4);
    animation: listenPulse 2.6s ease-in-out infinite;
  }
  .listen-btn:hover{ transform: scale(1.08); }
  .listen-btn.playing{ animation: none; }
  @keyframes listenPulse{
    0%,100%{ box-shadow: 0 0 0 0 rgba(255,111,168,0.28); }
    50%{ box-shadow: 0 0 0 18px rgba(255,111,168,0); }
  }

  #visualizer{
    width: min(420px, 80vw);
    height: 90px;
    display:block;
  }

  .audio-status{
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    color: rgba(245,212,232,0.5);
    min-height: 1.2em;
  }

  .skip-link{
    background:none; border:none;
    color: rgba(245,212,232,0.4);
    font-size:0.78rem;
    letter-spacing:0.05em;
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor:pointer;
    margin-top: 4px;
  }
  .skip-link:hover{ color: rgba(245,212,232,0.7); }

  #listenNextWrap{ opacity:0; transition: opacity 0.6s ease; }
  #listenNextWrap.revealed{ opacity:1; }
</style>
</head>
<body>

<div id="sky"></div>
<div id="aurora"></div>
<canvas id="fx"></canvas>

<div id="skipHint">esc to skip ahead · → to continue</div>
<button id="soundToggle" aria-label="Toggle music" title="Toggle music">🔇</button>

<div id="stage">
  <!-- Cards are generated by JS below -->
</div>

<div id="progress"></div>

<div id="modalOverlay">
  <div class="modal-box" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    <h3>Would you like to leave a reply?</h3>
    <textarea id="replyText" placeholder="Say anything... or nothing at all."></textarea>
    <div class="modal-actions">
      <button class="glass-btn" id="sendReply">Send reply 🕊️</button>
      <button class="glass-btn" id="skipReply">Not now</button>
    </div>
    <div class="modal-status" id="modalStatus"></div>
  </div>
</div>

const STORY = [
  { eyebrow:"", title:"Hey.", subtitle:"I know this is unexpected.", typewriter:true },
  { title:"Glad this caught your attention.", small:true },
  { title:"So, I'm really in love with you.", glow:true },
  { title:"I don't know what it was...", small:true },
  { title:"But what I do know is...", small:true },
  { title:"It was the first day I saw you.", small:true },
  { title:"During that Astronomy Club presentation.", small:true },
  { title:"Back in the Gymkhana presentations.", small:true },
  { title:"I stayed there longer than I should have.", small:true },
  { title:"Maybe you noticed.", small:true },
  { title:"Maybe you smiled.", small:true },
  { title:"Or maybe I'm just very delusional.", small:true, playful:true },
  { title:"But whatever happened...", small:true },
  { title:"It made me stay a little longer.", small:true },
  { title:"And after that...", small:true },
  { title:"I just wanted to meet you again.", small:true },
  { title:"And every time we did...", small:true },
  { title:"I fell a little more for you.", small:true },
  { title:"Then a little more.", small:true },
  { title:"And somehow...", small:true },
  { title:"A lot more.", small:true, glow:true },
  { headphoneWarning:true },
  { listenPage:true },
  { finalConfession:true },
  { finalChoice:true }
];

let current = 0;
const stage = document.getElementById('stage');
const progressEl = document.getElementById('progress');

function buildProgressDots(){
  progressEl.innerHTML = '';
  STORY.forEach((_, i) => {
    const dot = document.createElement('span');
    dot.dataset.idx = i;
    progressEl.appendChild(dot);
  });
}
function updateProgressDots(){
  [...progressEl.children].forEach((dot, i) => {
    dot.classList.toggle('seen', i < current);
    dot.classList.toggle('now', i === current);
  });
}

function makeNextButton(label = "Read Ahead"){
  const wrap = document.createElement('div');
  wrap.className = 'next-wrap';
  wrap.innerHTML = `
    <span class="next-emoji">👀</span>
    <button class="glass-btn next-btn">${label}</button>
  `;
  const btn = wrap.querySelector('.next-btn');
  btn.addEventListener('click', (e) => {
    spawnRipple(btn, e);
    spawnBurst(btn);
    goNext();
  });
  return wrap;
}

function spawnRipple(btn, e){
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size/2) + 'px';
  r.style.top = (e.clientY - rect.top - size/2) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

function buildCard(data, idx){
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.idx = idx;

  if (data.headphoneWarning){
    card.innerHTML = `
      <div class="headphone-emoji">🎧</div>
      <div class="headphone-lines">
        <p class="small">A small request</p>
        <p>Please put on your headphones.</p>
        <p>Trust me on this one.</p>
        <p class="small">When you're ready</p>
      </div>
    `;
    card.appendChild(makeNextButton());
    return card;
  }

  if (data.listenPage){
    card.innerHTML = `
      <div class="title" style="font-size:clamp(1.6rem,4.6vw,2.4rem)">This is how you sound whenever I think of you.</div>
      <button class="listen-btn" id="listenBtn" aria-label="Play">▶</button>
      <canvas id="visualizer"></canvas>
      <div class="audio-status" id="audioStatus"></div>
      <div class="next-wrap" id="listenNextWrap"></div>
      <button class="skip-link" id="skipAudio">Skip this</button>
    `;
    return card;
  }

  if (data.finalConfession){
    card.innerHTML = `
      <div class="eyebrow">a moment, please</div>
      <div class="reveal-stack" id="confessionStack"></div>
      <div id="confessionNext"></div>
    `;
    return card;
  }

  if (data.finalChoice){
    card.innerHTML = `
      <div class="title" style="font-size:clamp(1.7rem,4.8vw,2.6rem)">You don't need to know who I am.</div>
      <div class="subtitle">But I'd love to know what you think.</div>
      <div class="choice-row">
        <button class="glass-btn choice-btn" data-choice="yes">💖 Yes, let's meet</button>
        <button class="glass-btn choice-btn" data-choice="time">🤍 I need time</button>
        <button class="glass-btn choice-btn" data-choice="no">🌙 No, but thank you</button>
      </div>
    `;
    card.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        spawnRipple(btn, e);
        spawnBurst(btn);
        openModal(btn.dataset.choice);
      });
    });
    return card;
  }

  const titleSize = data.small ? 'clamp(1.7rem, 5vw, 2.7rem)' : '';
  const titleEl = document.createElement('div');
  titleEl.className = 'title' + (data.glow ? ' glow' : '');
  if (titleSize) titleEl.style.fontSize = titleSize;

  if (data.playful){
    titleEl.innerHTML = data.title.replace('delusional', '<span class="playful-wiggle">delusional</span> 🌀');
  } else {
    titleEl.textContent = data.title;
  }
  card.appendChild(titleEl);

  if (data.subtitle){
    const sub = document.createElement('div');
    sub.className = 'subtitle';
    sub.textContent = data.subtitle;
    card.appendChild(sub);
  }

  card.appendChild(makeNextButton());
  return card;
}

function renderAll(){
  STORY.forEach((data, i) => stage.appendChild(buildCard(data, i)));
  buildProgressDots();
  showCard(0);
}

function showCard(idx){
  const cards = stage.querySelectorAll('.card');
  cards.forEach((c, i) => {
    if (i === idx){
      c.classList.remove('leaving');
      requestAnimationFrame(() => c.classList.add('active'));
    } else {
      c.classList.remove('active');
    }
  });
  current = idx;
  updateProgressDots();

  if (STORY[idx].typewriter){
    runTypewriter(cards[idx]);
  }
  if (STORY[idx].listenPage){
    setupListenPage(cards[idx]);
  }
  if (STORY[idx].finalConfession){
    runFinalConfession(cards[idx]);
  }
  if (STORY[idx].finalChoice){
    document.getElementById('sky').classList.add('bright');
    boostParticles();
  }
}

let navLocked = false;

function goNext(){
  if (navLocked) return;
  if (current >= STORY.length - 1) return;
  const cards = stage.querySelectorAll('.card');
  cards[current].classList.add('leaving');
  cards[current].classList.remove('active');
  setTimeout(() => showCard(current + 1), 250);
}
function goPrev(){
  if (navLocked) return;
  if (current <= 0) return;
  const cards = stage.querySelectorAll('.card');
  cards[current].classList.remove('active');
  setTimeout(() => showCard(current - 1), 100);
}

/* Typewriter for page 1 subtitle */
function runTypewriter(card){
  const sub = card.querySelector('.subtitle');
  if (!sub || sub.dataset.done) return;
  const text = sub.textContent;
  sub.textContent = '';
  sub.classList.add('typewriter');
  let i = 0;
  const interval = setInterval(() => {
    sub.textContent += text[i];
    i++;
    if (i >= text.length){
      clearInterval(interval);
      sub.classList.add('done');
      sub.dataset.done = 'true';
    }
  }, 38);
}

/* Final confession reveal sequence */
function runFinalConfession(card){
  const stack = card.querySelector('#confessionStack');
  if (stack.dataset.done) return;
  stack.dataset.done = 'true';
  const lines = ["So here I am.", "I like you.", "A lot.", "And I wanted you to know."];
  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'reveal-line';
    el.textContent = line;
    stack.appendChild(el);
    setTimeout(() => el.classList.add('show'), 600 + i * 1300);
  });
  setTimeout(() => {
    const nextWrap = makeNextButton("Read Ahead");
    card.querySelector('#confessionNext').appendChild(nextWrap);
  }, 600 + lines.length * 1300 + 400);
}

/* ============================================================
   LISTEN PAGE — headphone moment with audio-reactive visualizer
   ============================================================ */
let audioCtx = null;
let analyser = null;
let analyserSource = null;
let listenSetupDone = false;

function setupListenPage(card){
  if (listenSetupDone) return;
  listenSetupDone = true;

  const listenBtn = card.querySelector('#listenBtn');
  const skipBtn = card.querySelector('#skipAudio');
  const statusEl = card.querySelector('#audioStatus');
  const nextWrap = card.querySelector('#listenNextWrap');
  const vizCanvas = card.querySelector('#visualizer');
  const vizCtx = vizCanvas.getContext('2d');
  const audioEl = document.getElementById('listenAudio');

  function sizeViz(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = vizCanvas.getBoundingClientRect();
    vizCanvas.width = rect.width * dpr;
    vizCanvas.height = rect.height * dpr;
    vizCtx.setTransform(dpr,0,0,dpr,0,0);
  }
  sizeViz();
  window.addEventListener('resize', sizeViz);

  function finishUnlock(){
    navLocked = false;
    document.getElementById('sky').classList.remove('listen-dim');
    document.getElementById('stage').classList.remove('dimmed');
    nextWrap.classList.add('revealed');
  }

  function revealNextButton(){
    if (nextWrap.querySelector('.next-wrap')) return;
    nextWrap.innerHTML = '';
    nextWrap.appendChild(makeNextButton());
    nextWrap.classList.add('revealed');
  }

  let vizRAF = null;
  function drawIdleViz(){
    const w = vizCanvas.getBoundingClientRect().width;
    const h = vizCanvas.getBoundingClientRect().height;
    vizCtx.clearRect(0,0,w,h);
    vizCtx.strokeStyle = 'rgba(245,212,232,0.18)';
    vizCtx.lineWidth = 1.5;
    vizCtx.beginPath();
    vizCtx.moveTo(0, h/2);
    vizCtx.lineTo(w, h/2);
    vizCtx.stroke();
  }
  drawIdleViz();

  function drawActiveViz(){
    const w = vizCanvas.getBoundingClientRect().width;
    const h = vizCanvas.getBoundingClientRect().height;
    vizCtx.clearRect(0,0,w,h);

    if (analyser){
      const bufferLength = analyser.frequencyBinCount;
      const data = new Uint8Array(bufferLength);
      analyser.getByteFrequencyData(data);

      const barCount = 48;
      const barWidth = w / barCount;
      let sumForParticles = 0;

      for (let i=0;i<barCount;i++){
        const dataIndex = Math.floor((i / barCount) * bufferLength * 0.6);
        const value = data[dataIndex] / 255;
        sumForParticles += value;
        const barHeight = Math.max(2, value * h * 0.85);
        const x = i * barWidth;
        const y = (h - barHeight) / 2;

        const grad = vizCtx.createLinearGradient(0, y, 0, y + barHeight);
        grad.addColorStop(0, 'rgba(255,212,126,0.85)');
        grad.addColorStop(1, 'rgba(255,111,168,0.55)');
        vizCtx.fillStyle = grad;
        vizCtx.beginPath();
        vizCtx.roundRect ? vizCtx.roundRect(x + barWidth*0.18, y, barWidth*0.64, barHeight, 3) : vizCtx.rect(x + barWidth*0.18, y, barWidth*0.64, barHeight);
        vizCtx.fill();
      }

      const avg = sumForParticles / barCount;
      audioReactiveLevel = avg;
    }
    vizRAF = requestAnimationFrame(drawActiveViz);
  }

  function lockIn(){
    navLocked = true;
    document.getElementById('sky').classList.add('listen-dim');
    document.getElementById('stage').classList.add('dimmed');
  }

  function cleanupAndContinue(){
    cancelAnimationFrame(vizRAF);
    audioReactiveLevel = 0;
    drawIdleViz();
    statusEl.textContent = '';
    finishUnlock();
    revealNextButton();
  }

  listenBtn.addEventListener('click', async () => {
    if (!LISTEN_AUDIO_URL){
      statusEl.textContent = "No audio file configured yet — add LISTEN_AUDIO_URL.";
      lockIn();
      setTimeout(cleanupAndContinue, 1800);
      return;
    }

    lockIn();
    listenBtn.classList.add('playing');
    listenBtn.textContent = '⏸';
    statusEl.textContent = 'Playing...';

    try{
      if (!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      audioEl.src = LISTEN_AUDIO_URL;

      if (!analyserSource){
        analyserSource = audioCtx.createMediaElementSource(audioEl);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyserSource.connect(analyser);
        analyser.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      await audioEl.play();
      drawActiveViz();
    } catch(err){
      console.error('Audio playback/analysis failed:', err);
      statusEl.textContent = 'Could not play audio.';
      setTimeout(cleanupAndContinue, 1200);
      return;
    }

    audioEl.onended = () => {
      statusEl.textContent = 'That\u2019s the sound.';
      cleanupAndContinue();
    };
  });

  skipBtn.addEventListener('click', () => {
    audioEl.pause();
    cancelAnimationFrame(vizRAF);
    audioReactiveLevel = 0;
    cleanupAndContinue();
  });
}

/* ============================================================
   PARTICLE SYSTEM — fireflies + hearts + sparkles + mouse trail
   ============================================================ */
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener('resize', resize);

const mouse = { x: W/2, y: H/2, active:false };
window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
window.addEventListener('mouseleave', () => mouse.active = false);
window.addEventListener('touchmove', (e) => {
  if (e.touches[0]){ mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.active = true; }
}, { passive:true });

let fireflyCount = 42;
let intensity = 1;
let audioReactiveLevel = 0; // 0-1, driven by the listen page's analyser
function boostParticles(){ intensity = 1.8; fireflyCount = 64; rebuildFireflies(); }

class Firefly{
  constructor(){ this.reset(true); }
  reset(initial){
    this.x = Math.random() * W;
    this.y = initial ? Math.random() * H : H + 10;
    this.baseSize = 1.2 + Math.random() * 2;
    this.size = this.baseSize;
    this.speedY = -(0.15 + Math.random() * 0.35);
    this.driftPhase = Math.random() * Math.PI * 2;
    this.driftSpeed = 0.005 + Math.random() * 0.01;
    this.flickerPhase = Math.random() * Math.PI * 2;
    this.flickerSpeed = 0.02 + Math.random() * 0.04;
    this.hue = Math.random() < 0.5 ? '255,212,126' : '255,111,168';
    this.vx = 0; this.vy = this.speedY;
  }
  update(t){
    this.driftPhase += this.driftSpeed;
    this.flickerPhase += this.flickerSpeed;
    const drift = Math.sin(this.driftPhase) * 0.4;
    this.vx += (drift - this.vx) * 0.05;
    this.y += this.vy * intensity;
    this.x += this.vx;

    if (mouse.active){
      const dx = this.x - mouse.x, dy = this.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 140 && dist > 0.1){
        const force = (140 - dist) / 140 * 0.6;
        this.vx += (dx / dist) * force * 0.18;
        this.y += (dy / dist) * force * 0.18;
      }
    }

    const flicker = 0.55 + Math.sin(this.flickerPhase) * 0.45;
    const audioBoost = audioReactiveLevel * 0.5;
    this.size = this.baseSize * (0.7 + flicker * 0.6 + audioBoost);
    this.alpha = Math.min(1, 0.35 + flicker * 0.55 + audioBoost * 0.4);

    if (this.y < -20 || this.x < -20 || this.x > W + 20) this.reset(false);
  }
  draw(){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const glowSize = this.size * 6;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
    grad.addColorStop(0, `rgba(${this.hue},${this.alpha})`);
    grad.addColorStop(1, `rgba(${this.hue},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowSize, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,250,240,${this.alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

class Heart{
  constructor(x, y){
    this.x = x; this.y = y;
    this.size = 6 + Math.random() * 8;
    this.vy = -(0.4 + Math.random() * 0.6);
    this.vx = (Math.random() - 0.5) * 0.4;
    this.life = 1;
    this.rot = (Math.random() - 0.5) * 0.4;
  }
  update(){ this.y += this.vy; this.x += this.vx; this.life -= 0.012; }
  draw(){
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(this.life, 0);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.scale(this.size/10, this.size/10);
    ctx.fillStyle = 'rgba(255,111,168,0.85)';
    ctx.beginPath();
    ctx.moveTo(0, 3);
    ctx.bezierCurveTo(-6,-4, -10,4, 0,12);
    ctx.bezierCurveTo(10,4, 6,-4, 0,3);
    ctx.fill();
    ctx.restore();
  }
}

class Spark{
  constructor(x,y){
    this.x=x; this.y=y;
    const a = Math.random()*Math.PI*2;
    const sp = 1 + Math.random()*2.5;
    this.vx = Math.cos(a)*sp; this.vy = Math.sin(a)*sp;
    this.life = 1; this.size = 1+Math.random()*1.8;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vx*=0.94; this.vy*=0.94; this.life-=0.035; }
  draw(){
    if (this.life<=0) return;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = this.life;
    ctx.fillStyle = 'rgba(255,212,126,1)';
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

let fireflies = [];
function rebuildFireflies(){
  fireflies = Array.from({length: fireflyCount}, () => new Firefly());
}
rebuildFireflies();

let hearts = [];
let sparks = [];
let trail = [];

function spawnBurst(el){
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  for (let i=0;i<18;i++) sparks.push(new Spark(cx,cy));
}

let lastTrail = 0;
function maybeSpawnTrail(t){
  if (!mouse.active) return;
  if (t - lastTrail < 60) return;
  lastTrail = t;
  if (Math.random() < 0.5) hearts.push(new Heart(mouse.x + (Math.random()-0.5)*10, mouse.y));
  else sparks.push(new Spark(mouse.x, mouse.y));
}

function connectFireflies(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i=0;i<fireflies.length;i++){
    for (let j=i+1;j<fireflies.length;j++){
      const a = fireflies[i], b = fireflies[j];
      const dx=a.x-b.x, dy=a.y-b.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 70){
        ctx.strokeStyle = `rgba(255,212,126,${(1 - d/70) * 0.18})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

function loop(t){
  ctx.clearRect(0,0,W,H);

  fireflies.forEach(f => { f.update(t); f.draw(); });
  connectFireflies();

  maybeSpawnTrail(t);

  hearts = hearts.filter(h => h.life > 0);
  hearts.forEach(h => { h.update(); h.draw(); });

  sparks = sparks.filter(s => s.life > 0);
  sparks.forEach(s => { s.update(); s.draw(); });

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
